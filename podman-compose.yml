version: '3.8'

services:
  resume-analyzer:
    build: .
    container_name: resume-analyzer
    ports:
      - "8085:5000"
    volumes:
      - ./app-data:/app/data
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=production
      # JWT_SECRET should be overridden in production
      - JWT_SECRET=production-secret-key-please-change
      # Mount DB and uploads to the volume
      - DB_PATH=/app/data/database.sqlite
